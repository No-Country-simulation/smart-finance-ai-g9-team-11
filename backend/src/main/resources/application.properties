spring.application.name=finance-ai-api

# ==========================
# Configurań§es do banco de dados MySQL
# ==========================
spring.datasource.url=jdbc:mysql://localhost:3306/finance_ai?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================
# Configurań§es do banco de dados Oracle
# ==========================
#spring.datasource.url=${DB_URL}
#spring.datasource.username=${DB_USERNAME}
#spring.datasource.password=${DB_PASSWORD}
#spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# ==========================
# Configurań§es do Hibernate
# ==========================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ==========================
# Configurań§es do FlyWay
# ==========================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-version=0

# ==========================
# Configurań§es do servińo do FastAPI
# ==========================
ml.api.url=http://localhost:8000