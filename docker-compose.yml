version: '3.8'

networks:
  finance-network:
    driver: bridge

services:
  ml-service:
    container_name: ml-service
    build:
      context: .
      dockerfile: docker/ml.Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - OCI_STORAGE_BUCKET=finance-ai-bucket
    networks:
      - finance-network

  backend-service:
    container_name: backend-service
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - ML_SERVICE_URL=http://ml-service:8000
    depends_on:
      - ml-service
    networks:
      - finance-network

  frontend-service:
    container_name: frontend-service
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend-service
    networks:
      - finance-network